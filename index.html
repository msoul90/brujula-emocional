<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brújula Emocional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .emotion-card { transition: all 0.2s ease; border: 1px solid rgba(0,0,0,0.05); }
        .emotion-card:active { transform: scale(0.96); opacity: 0.8; }
        .emotion-card:focus-visible {
            outline: 3px solid #2563eb;
            outline-offset: 2px;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }
        body { background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        @media (prefers-reduced-motion: reduce) {
            .emotion-card,
            #modal,
            #modal-panel {
                transition: none !important;
                animation: none !important;
            }

            #modal-panel {
                transform: none !important;
            }
        }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="mb-6 mt-2">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Brújula Emocional</h1>
        <p class="text-slate-500 font-medium">Encuentra claridad en lo que sientes.</p>
    </header>

    <div class="sticky top-2 z-40 mb-6">
        <div class="relative group">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="search" placeholder="¿Qué sientes hoy? (ej. Ansiedad, Placer...)" 
                   class="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-lg focus:ring-4 focus:ring-blue-500/20 outline-none text-slate-700">
        </div>
    </div>

    <section id="recent-section" class="mb-6 hidden" aria-live="polite">
        <h2 class="text-sm font-black text-slate-500 uppercase tracking-wider mb-2">Vistas recientemente</h2>
        <div id="recent-grid" class="flex gap-3 overflow-x-auto hide-scroll pb-2 pr-1"></div>
    </section>

    <div id="emotion-grid" class="grid grid-cols-1 gap-3">
        </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden opacity-0 flex items-end sm:items-center justify-center z-50 transition-opacity duration-200">
        <div id="modal-panel" class="bg-white rounded-t-[2.5rem] sm:rounded-3xl max-w-lg w-full max-h-[85vh] overflow-y-auto p-8 shadow-2xl hide-scroll transition-all duration-200 translate-y-8 sm:translate-y-0 sm:scale-95 opacity-0">
            <div id="modal-content"></div>
            <button onclick="closeModal()" class="mt-8 w-full bg-slate-200 border border-slate-300 text-slate-900 py-4 rounded-2xl font-bold active:bg-slate-300 transition-colors">Entendido</button>
        </div>
    </div>

    <script>
        const emociones = [
            // --- TABLA 1 ---
            { nombre: "Enojo", color: "#fecaca", text: "#7f1d1d", siente: "Calor, tensión, energía alta, mandíbula apretada", dispara: "Injusticia, límite invadido, frustración", funcion: "Proteger límites, movilizar cambio", mensaje: "Algo no me está funcionando", impulso: "Atacar, reclamar, cortar", respuesta: "Pausar, nombrar límite, pedir cambio claro" },
            { nombre: "Tristeza", color: "#bfdbfe", text: "#1e3a8a", siente: "Pesadez, llanto, cansancio, vacío", dispara: "Pérdida, decepción, distancia", funcion: "Procesar pérdida, pedir apoyo, bajar ritmo", mensaje: "Algo importante me dolió", impulso: "Aislarse, rendirse", respuesta: "Validar dolor, buscar apoyo, autocuidado" },
            { nombre: "Miedo", color: "#ddd6fe", text: "#4c1d95", siente: "Alerta, aceleración, tensión, nudo estomacal", dispara: "Riesgo, amenaza, incertidumbre", funcion: "Proteger y prepararse", mensaje: "Percibo peligro o vulnerabilidad", impulso: "Huir, congelarse, evitar", respuesta: "Evaluar riesgo real, respirar, avanzar gradual" },
            { nombre: "Ansiedad", color: "#fed7aa", text: "#7c2d12", siente: "Inquietud, mente acelerada, urgencia", dispara: "Incertidumbre, anticipación, presión", funcion: "Preparar recursos, enfocar atención", mensaje: "Algo importa y no lo controlo", impulso: "Sobrepensar, controlar, evitar", respuesta: "Reducir velocidad, priorizar, tolerar incertidumbre" },
            { nombre: "Vergüenza", color: "#fbcfe8", text: "#831843", siente: "Calor facial, ganas de esconderse", dispara: "Crítica, exposición, error social", funcion: "Cuidar pertenencia social", mensaje: "Temo rechazo o juicio", impulso: "Ocultarse, justificarse", respuesta: "Autocompasión, perspectiva realista, reparar si aplica" },
            { nombre: "Culpa", color: "#bbf7d0", text: "#064e3b", siente: "Peso interno, inquietud, remordimiento", dispara: "Haber dañado o ir contra valores", funcion: "Reparar, reajustar conducta", mensaje: "Algo no estuvo alineado con mis valores", impulso: "Castigarse, sobreexplicar", respuesta: "Reparar, disculparse, aprender" },
            { nombre: "Frustración", color: "#fca5a5", text: "#7f1d1d", siente: "Tensión, irritación, impaciencia", dispara: "Obstáculos, demora, bloqueo", funcion: "Señalar meta bloqueada", mensaje: "Quiero algo y no está saliendo", impulso: "Forzar, explotar, abandonar", respuesta: "Flexibilidad, dividir pasos, pedir ayuda" },
            { nombre: "Celos", color: "#d9f99d", text: "#365314", siente: "Activación, vigilancia, inseguridad", dispara: "Amenaza de pérdida, comparación", funcion: "Proteger vínculo, detectar necesidad", mensaje: "Temo perder conexión o valor", impulso: "Controlar, reclamar, revisar", respuesta: "Expresar necesidad, revisar evidencia, fortalecer autoestima" },
            { nombre: "Soledad", color: "#93c5fd", text: "#1e3a8a", siente: "Vacío, nostalgia, desánimo", dispara: "Desconexión, falta de apoyo", funcion: "Motivar conexión", mensaje: "Necesito vínculo significativo", impulso: "Aislarse más", respuesta: "Buscar contacto gradual y genuino" },
            { nombre: "Alegría", color: "#fef08a", text: "#713f12", siente: "Ligereza, energía, expansión", dispara: "Logro, conexión, disfrute", funcion: "Reforzar conductas valiosas", mensaje: "Esto me nutre", impulso: "Compartir, seguir", respuesta: "Saborear, agradecer, repetir conductas sanas" },
            { nombre: "Calma", color: "#a5f3fc", text: "#164e63", siente: "Suavidad corporal, respiración estable", dispara: "Seguridad, descanso, claridad", funcion: "Recuperación y equilibrio", mensaje: "Por ahora estoy a salvo", impulso: "Bajar guardia total", respuesta: "Aprovechar para planear y recargar" },
            { nombre: "Confusión", color: "#ffedd5", text: "#7c2d12", siente: "Niebla mental, duda, bloqueo", dispara: "Información contradictoria, ambivalencia", funcion: "Señalar necesidad de claridad", mensaje: "Me falta información o tiempo", impulso: "Decidir impulsivo, congelarse", respuesta: "Hacer preguntas, esperar, ordenar ideas" },
            
            // --- TABLA 2 ---
            { nombre: "Preocupación", color: "#6b21a8", text: "#ffffff", siente: "Mente ocupada, tensión, anticipación, dificultad para soltar pensamientos", dispara: "Incertidumbre, responsabilidad, miedo a errores o consecuencias", funcion: "Anticipar posibles problemas y prepararse", mensaje: "Hay algo importante que quiero cuidar o controlar", impulso: "Sobrepensar, revisar excesivamente, buscar certeza", respuesta: "Priorizar, distinguir lo real de lo imaginado, regresar al presente" },
            { nombre: "Felicidad", color: "#fde047", text: "#713f12", siente: "Ligereza, bienestar, relajación, sensación de plenitud", dispara: "Conexión, logro, seguridad, momentos agradables", funcion: "Reforzar experiencias valiosas y conexión", mensaje: "Esto me hace bien y quiero conservarlo", impulso: "Compartir, acercarse, disfrutar", respuesta: "Permitirse disfrutar y registrar lo positivo" },
            { nombre: "Entusiasmo", color: "#67e8f9", text: "#164e63", siente: "Energía alta, motivación, emoción positiva, impulso de actuar", dispara: "Nuevos proyectos, interés, ilusión, conexión", funcion: "Movilizar acción y exploración", mensaje: "Hay algo que me inspira o importa mucho", impulso: "Hacer demasiado rápido, comprometerse impulsivamente", respuesta: "Mantener motivación con ritmo sostenible" },
            { nombre: "Placer", color: "#f9a8d4", text: "#831843", siente: "Sensación agradable, comodidad, satisfacción corporal o emocional", dispara: "Descanso, disfrute, contacto, experiencias gratificantes", funcion: "Favorecer bienestar y recuperación", mensaje: "Esto se siente nutritivo o satisfactorio", impulso: "Buscar repetir inmediatamente", respuesta: "Disfrutar conscientemente y mantener equilibrio" },
            { nombre: "Angustia", color: "#60a5fa", text: "#1e3a8a", siente: "Opresión, desesperación, sensación de no poder sostener algo", dispara: "Pérdida de control, miedo intenso, incertidumbre alta", funcion: "Señalar saturación emocional o amenaza percibida", mensaje: "Algo me está sobrepasando", impulso: "Escapar, aislarse, buscar alivio inmediato", respuesta: "Regular el cuerpo, pedir apoyo, reducir estímulos" },
            { nombre: "Irritabilidad", color: "#bef264", text: "#365314", siente: "Tensión, impaciencia, sensibilidad alta, facilidad para molestarse", dispara: "Cansancio, estrés, frustración acumulada, sobrecarga", funcion: "Señalar saturación o necesidad de pausa", mensaje: "Estoy agotado o algo me está sobrepasando", impulso: "Responder cortante, discutir, alejarse", respuesta: "Descansar, bajar exigencia, expresar necesidad antes de explotar" },
            { nombre: "Rechazo", color: "#d8b4fe", text: "#4c1d95", siente: "Distancia, incomodidad, desagrado o exclusión", dispara: "Crítica, desaprobación, falta de aceptación o incompatibilidad", funcion: "Proteger identidad, límites o pertenencia", mensaje: "Esto no se siente seguro o compatible para mí", impulso: "Alejarse, cerrarse, atacar o evitar", respuesta: "Explorar si el rechazo viene de daño o inseguridad y responder con claridad" }
        ];

        const RECENT_KEY = 'brujulaRecientes';
        const RECENT_LIMIT = 5;
        const REDUCED_MOTION = globalThis.matchMedia?.('(prefers-reduced-motion: reduce)').matches ?? false;
        const MODAL_ANIMATION_MS = REDUCED_MOTION ? 0 : 200;
        let lastFocusedCard = null;
        let isClosingModal = false;

        function normalizeText(value) {
            return value
                .toLowerCase()
                .normalize('NFD')
                .replaceAll(/[\u0300-\u036f]/g, '');
        }

        function loadRecentEmotions() {
            try {
                const parsed = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveRecentEmotion(nombre) {
            const existing = loadRecentEmotions().filter(item => item !== nombre);
            const next = [nombre, ...existing].slice(0, RECENT_LIMIT);
            localStorage.setItem(RECENT_KEY, JSON.stringify(next));
            renderRecentEmotions();
        }

        function shortRecentLabel(nombre) {
            return nombre.length > 9 ? `${nombre.slice(0, 9)}...` : nombre;
        }

        function renderRecentEmotions() {
            const section = document.getElementById('recent-section');
            const grid = document.getElementById('recent-grid');
            const recents = loadRecentEmotions();

            if (!recents.length) {
                section.classList.add('hidden');
                grid.innerHTML = '';
                return;
            }

            section.classList.remove('hidden');
            grid.innerHTML = '';

            recents.forEach(nombre => {
                const emotion = emociones.find(e => e.nombre === nombre);
                if (!emotion) return;

                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'emotion-card shrink-0 w-20 h-20 rounded-full shadow-sm bg-white border-2 flex items-center justify-center text-center px-2 text-[11px] font-bold leading-tight text-slate-700';
                card.style.borderColor = emotion.color;
                card.setAttribute('aria-label', `Abrir emoción ${emotion.nombre}`);
                card.title = emotion.nombre;
                card.innerHTML = `<span>${shortRecentLabel(emotion.nombre)}</span>`;
                card.addEventListener('click', () => {
                    lastFocusedCard = card;
                    showDetail(emotion);
                });
                grid.appendChild(card);
            });
        }

        function renderEmociones(filter = "") {
            const grid = document.getElementById('emotion-grid');
            grid.innerHTML = "";
            const normalizedFilter = normalizeText(filter.trim());
            const filtered = emociones.filter(e => {
                const haystack = [e.nombre, e.siente, e.dispara, e.mensaje]
                    .map(normalizeText)
                    .join(' ');
                return haystack.includes(normalizedFilter);
            });

            if (!filtered.length) {
                const emptyState = document.createElement('div');
                emptyState.className = 'bg-white rounded-2xl p-5 text-center shadow-sm border border-slate-200';
                emptyState.innerHTML = `
                    <p class="text-slate-700 font-bold mb-1">No encontramos esa emoción</p>
                    <p class="text-slate-500 text-sm">Prueba con otra palabra como "incertidumbre", "calma" o "dolor".</p>
                `;
                grid.appendChild(emptyState);
                return;
            }
            
            filtered.forEach(e => {
                const card = document.createElement('div');
                card.className = "emotion-card p-5 rounded-2xl shadow-sm cursor-pointer flex justify-between items-center bg-white";
                card.style.borderLeft = `8px solid ${e.color}`;
                card.tabIndex = 0;
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', `Abrir detalle de ${e.nombre}`);
                card.onclick = () => {
                    lastFocusedCard = card;
                    showDetail(e);
                };
                card.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        lastFocusedCard = card;
                        showDetail(e);
                    }
                });
                card.innerHTML = `
                    <span class="font-bold text-lg text-slate-700">${e.nombre}</span>
                    <span class="text-xs font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-400 uppercase tracking-wider">Ver</span>
                `;
                grid.appendChild(card);
            });
        }

        function showDetail(e) {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="inline-block px-4 py-1 rounded-full mb-2" style="background-color:${e.color}; color:${e.text}">
                    <span class="text-xs font-black uppercase tracking-widest">Emoción</span>
                </div>
                <h2 class="text-4xl font-black mb-6 text-slate-800">${e.nombre}</h2>
                
                <div class="space-y-6">
                    <div class="grid grid-cols-1 gap-4">
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <p class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-1">¿Cómo se siente?</p>
                            <p class="text-slate-700 leading-relaxed font-medium">${e.siente}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <p class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-1">¿Qué la dispara?</p>
                            <p class="text-slate-700 leading-relaxed font-medium">${e.dispara}</p>
                        </div>
                    </div>

                    <div class="relative p-6 rounded-3xl text-white overflow-hidden shadow-lg" style="background-color:${e.color}; color:${e.text}">
                         <i class="fa-solid fa-quote-left absolute -top-2 -left-2 text-black/10 text-6xl"></i>
                         <p class="text-[11px] font-black opacity-80 uppercase tracking-widest mb-2">Lo que te está diciendo:</p>
                        <p class="text-[1.45rem] sm:text-[1.65rem] font-serif italic leading-[1.35] sm:leading-snug" style="color: rgba(0,0,0,0.78)">"${e.mensaje}"</p>
                    </div>

                    <div>
                        <p class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2 px-1">Respuesta sugerida</p>
                        <div class="bg-emerald-50 border-2 border-emerald-100 p-4 rounded-2xl">
                            <p class="text-emerald-900 font-bold leading-relaxed">${e.respuesta}</p>
                        </div>
                    </div>
                </div>
            `;
            const modal = document.getElementById('modal');
            const panel = document.getElementById('modal-panel');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                panel.classList.remove('translate-y-8', 'sm:scale-95', 'opacity-0');
            });
            document.body.style.overflow = 'hidden';
            saveRecentEmotion(e.nombre);
            const closeButton = modal.querySelector('button');
            if (closeButton) closeButton.focus();
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const panel = document.getElementById('modal-panel');

            if (modal.classList.contains('hidden') || isClosingModal) return;

            isClosingModal = true;
            modal.classList.add('opacity-0');
            panel.classList.add('translate-y-8', 'sm:scale-95', 'opacity-0');

            setTimeout(() => {
                modal.classList.add('hidden');
                isClosingModal = false;
            }, MODAL_ANIMATION_MS);

            document.body.style.overflow = 'auto';
            if (lastFocusedCard) lastFocusedCard.focus();
        }

        document.getElementById('modal').addEventListener('click', (event) => {
            if (event.target.id === 'modal') {
                closeModal();
            }
        });

        document.addEventListener('keydown', (event) => {
            const modal = document.getElementById('modal');
            if (event.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });

        document.getElementById('search').addEventListener('input', (e) => renderEmociones(e.target.value));
        renderRecentEmotions();
        renderEmociones();
    </script>
</body>
</html>
