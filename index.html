<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brújula Emocional</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="pwa/manifest.webmanifest">
    <link rel="icon" href="pwa/icons/icon-192.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="p-4 pb-24">

    <header class="mb-6 mt-2 flex items-start justify-between gap-3">
        <div>
            <h1 id="app-title" class="text-3xl font-black text-slate-800 tracking-tight">Brújula Emocional</h1>
            <p id="app-subtitle" class="text-slate-500 font-medium">Encuentra claridad en lo que sientes.</p>
        </div>
        <div class="shrink-0 bg-white/80 backdrop-blur-sm border border-slate-200 rounded-2xl p-1.5 shadow-sm">
            <div class="relative">
                <i class="fa-solid fa-globe absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                <select id="language-select" class="language-select appearance-none bg-gradient-to-b from-white to-slate-50 border border-slate-200 rounded-xl pl-8 pr-8 py-2 text-sm font-semibold text-slate-700 shadow-sm focus:ring-2 focus:ring-blue-500/30 outline-none" aria-label="Selector de idioma">
                    <option value="es">ES</option>
                    <option value="en">EN</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-[10px] pointer-events-none"></i>
            </div>
        </div>
    </header>

    <div class="sticky top-2 z-40 mb-6">
        <div class="relative group">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="search" placeholder="¿Qué sientes hoy? (ej. Ansiedad, Placer...)" 
                   class="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-lg focus:ring-4 focus:ring-blue-500/20 outline-none text-slate-700">
        </div>
    </div>

    <section id="recent-section" class="mb-6 hidden" aria-live="polite">
        <h2 id="recent-title" class="text-sm font-black text-slate-500 uppercase tracking-wider mb-2">Vistas recientemente</h2>
        <div id="recent-grid" class="flex gap-3 overflow-x-auto hide-scroll pb-2 pr-1"></div>
    </section>

    <div id="emotion-grid" class="grid grid-cols-1 gap-3">
        </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden opacity-0 flex items-end sm:items-center justify-center z-50 transition-opacity duration-200">
        <div id="modal-panel" class="bg-white rounded-t-[2.5rem] sm:rounded-3xl max-w-lg w-full max-h-[85vh] overflow-y-auto p-8 shadow-2xl hide-scroll transition-all duration-200 translate-y-8 sm:translate-y-0 sm:scale-95 opacity-0">
            <div id="modal-content"></div>
            <button id="close-button" class="mt-8 w-full bg-slate-200 border border-slate-300 text-slate-900 py-4 rounded-2xl font-bold active:bg-slate-300 transition-colors">Entendido</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
