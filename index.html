<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brújula Emocional</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="pwa/manifest.webmanifest">
    <link rel="icon" href="pwa/icons/icon-192.svg" type="image/svg+xml">
    <script src="theme-init.js"></script>
    <link href="dist/tailwind.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="p-4 pb-24">

    <header class="mb-6 mt-2 flex items-start justify-between gap-3">
        <div>
            <h1 id="app-title" class="text-3xl font-black text-slate-800 tracking-tight">Brújula Emocional</h1>
            <p id="app-subtitle" class="text-slate-500 font-medium">Encuentra claridad en lo que sientes.</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <button id="install-app-button" class="hidden bg-slate-800 text-white text-[11px] font-bold px-3 py-2 rounded-xl hover:bg-slate-700 transition-colors whitespace-nowrap" type="button">
                Instalar app
            </button>
            <div class="relative">
            <button id="settings-btn" type="button"
                    class="bg-white/80 backdrop-blur-sm border border-slate-200 rounded-2xl p-2.5 shadow-sm hover:bg-white transition-colors"
                    aria-label="Configuración" aria-expanded="false" aria-controls="settings-panel">
                <svg class="w-5 h-5 text-slate-600" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
            <div id="settings-panel" class="hidden absolute right-0 top-full mt-2 bg-white rounded-2xl p-2.5 shadow-xl border border-slate-200 z-50">
                <div class="flex items-center gap-1.5">
                    <fieldset class="border-0 p-0 m-0 min-w-0">
                        <legend id="settings-theme-label" class="sr-only">Tema</legend>
                        <div class="flex gap-1">
                            <button id="theme-btn-light" data-theme-btn="light" type="button" title="Claro" aria-label="Claro"
                                    class="settings-option-btn w-9 h-9 flex items-center justify-center rounded-xl border border-slate-200 text-slate-500 transition-colors">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
                            </button>
                            <button id="theme-btn-auto" data-theme-btn="auto" type="button" title="Auto" aria-label="Auto"
                                    class="settings-option-btn w-9 h-9 flex items-center justify-center rounded-xl border border-slate-200 text-slate-500 transition-colors">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18V4c4.41 0 8 3.59 8 8s-3.59 8-8 8z"/></svg>
                            </button>
                            <button id="theme-btn-dark" data-theme-btn="dark" type="button" title="Oscuro" aria-label="Oscuro"
                                    class="settings-option-btn w-9 h-9 flex items-center justify-center rounded-xl border border-slate-200 text-slate-500 transition-colors">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                            </button>
                        </div>
                    </fieldset>
                    <div class="w-px h-5 bg-slate-200 mx-0.5" aria-hidden="true"></div>
                    <fieldset class="border-0 p-0 m-0 min-w-0">
                        <legend id="settings-lang-label" class="sr-only">Idioma</legend>
                        <div class="flex gap-1">
                            <button id="lang-btn-es" data-lang-btn="es" type="button" title="Español" aria-label="Español"
                                    class="settings-option-btn w-9 h-9 flex items-center justify-center text-xs font-bold rounded-xl border border-slate-200 text-slate-500 transition-colors">ES</button>
                            <button id="lang-btn-en" data-lang-btn="en" type="button" title="English" aria-label="English"
                                    class="settings-option-btn w-9 h-9 flex items-center justify-center text-xs font-bold rounded-xl border border-slate-200 text-slate-500 transition-colors">EN</button>
                        </div>
                    </fieldset>
                </div>
            </div>
            </div>
        </div>
    </header>

    <div class="sticky top-2 z-40 mb-6">
        <div class="relative group">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="search" placeholder="¿Qué sientes hoy? (ej. Ansiedad, Placer...)" 
                   class="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-lg focus:ring-4 focus:ring-blue-500/20 outline-none text-slate-700">
        </div>
    </div>

    <button id="quiz-trigger" type="button" class="w-full mb-6 text-left py-4 px-5 bg-white rounded-2xl shadow-sm flex items-center justify-between gap-3 hover:shadow-md transition-all" style="border-left: 6px solid #818cf8">
        <div>
            <p id="quiz-trigger-title" class="font-bold text-slate-700 text-sm">¿No sabes lo que sientes?</p>
            <p id="quiz-trigger-sub" class="text-slate-400 text-xs mt-1">Descúbrelo en 3 preguntas</p>
        </div>
        <svg class="w-5 h-5 text-indigo-300 shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </button>

    <section id="recent-section" class="mb-6 hidden" aria-live="polite">
        <h2 id="recent-title" class="text-sm font-medium text-slate-400 mb-3">Vistas recientemente</h2>
        <div id="recent-grid" class="flex gap-3 overflow-x-auto hide-scroll pb-2 pr-1"></div>
    </section>

    <div id="emotion-grid" class="grid grid-cols-1 gap-3">
        </div>

    <dialog id="quiz-panel" aria-label="¿Qué siento?">
        <div class="max-w-lg mx-auto p-6 pb-16">
            <div id="quiz-content"></div>
        </div>
    </dialog>

    <dialog id="modal" aria-labelledby="modal-emotion-title">
        <div id="modal-backdrop">
            <div id="modal-panel" class="bg-white rounded-t-[2.5rem] sm:rounded-3xl max-w-lg w-full max-h-[85vh] overflow-y-auto p-8 shadow-2xl hide-scroll transition-all duration-200 translate-y-8 sm:translate-y-0 sm:scale-95 opacity-0">
                <div id="modal-content"></div>
                <button id="close-button" class="mt-8 w-full bg-slate-200 border border-slate-300 text-slate-900 py-4 rounded-2xl font-bold active:bg-slate-300 transition-colors">Entendido</button>
            </div>
        </div>
    </dialog>

    <div id="ios-install-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[55] p-4 sm:p-6 flex items-end sm:items-center justify-center">
        <div id="ios-install-panel" class="bg-white rounded-3xl max-w-md w-full p-6 shadow-2xl">
            <h3 id="ios-install-title" class="text-xl font-black text-slate-800 mb-4">Instalar en iPhone/iPad</h3>
            <ol class="space-y-3 text-slate-700 text-sm leading-relaxed">
                <li id="ios-install-step-1">1. Toca el botón Compartir de Safari (cuadro con flecha hacia arriba).</li>
                <li id="ios-install-step-2">2. Selecciona "Añadir a pantalla de inicio".</li>
            </ol>
            <button id="ios-install-close" type="button" class="mt-6 w-full bg-slate-100 text-slate-900 py-3 rounded-2xl font-bold hover:bg-slate-200 transition-colors">Entendido</button>
        </div>
    </div>

    <script src="loader.js" defer></script>
</body>
</html>
